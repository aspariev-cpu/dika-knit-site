<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Knit — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon">🧵</span>
                <h1>Dika Knit</h1>
                <p>Мобильная версия</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" placeholder="Введите логин" value="admin" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" value="admin123" required>
                </div>

                <button type="submit" class="btn-auth">Войти</button>

                <div id="authError" class="auth-error" style="display: none;"></div>
            </form>

            <div class="auth-footer">
                <p>Dika Knit Production System v1.0</p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('authError');

            errorEl.style.display = 'none';

            const result = await loginUser(login, password);

            if (!result.success) {
                errorEl.textContent = result.error || 'Ошибка входа';
                errorEl.style.display = 'block';
            }
        });

        // Если уже есть токен — перенаправляем
        if (api.token) {
            const result = await api.verify();
            if (result.success) {
                window.location.href = '/dashboard';
            }
        }
    </script>
</body>
</html>
