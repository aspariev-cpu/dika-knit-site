<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Knit — Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="mobile-header">
        <div class="header-content">
            <div class="header-left">
                <span class="logo-icon">🧵</span>
                <span class="logo-text">Dika Knit</span>
            </div>
            <div class="header-right">
                <span class="user-name" id="userName">Загрузка...</span>
                <button class="btn-logout" onclick="logout()">🚪</button>
            </div>
        </div>
    </header>
    
    <main class="mobile-main">
        <!-- Статистика -->
        <section class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">🧵</div>
                <div class="stat-value" id="statToday">--</div>
                <div class="stat-label">Сегодня</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-value" id="statTasks">--</div>
                <div class="stat-label">В работе</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🖥️</div>
                <div class="stat-value" id="statMachines">--</div>
                <div class="stat-label">Станки</div>
            </div>
            <div class="stat-card urgent">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="statUrgent">--</div>
                <div class="stat-label">Срочных</div>
            </div>
        </section>
        
        <!-- Навигация -->
        <nav class="mobile-nav">
            <a href="/worker" class="nav-card">
                <span class="nav-icon">🖥️</span>
                <span class="nav-label">Станки</span>
            </a>
            <a href="/worker?tab=tasks" class="nav-card">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Задания</span>
            </a>
            <a href="/worker?tab=salary" class="nav-card">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Зарплата</span>
            </a>
            <a href="/admin" class="nav-card admin-only" id="adminNav">
                <span class="nav-icon">👑</span>
                <span class="nav-label">Админ</span>
            </a>
        </nav>
        
        <!-- Активные задания -->
        <section class="tasks-section">
            <div class="section-header">
                <h2>Активные задания</h2>
                <span class="badge" id="tasksCount">0</span>
            </div>
            <div class="tasks-list" id="tasksList">
                <div class="loading">Загрузка...</div>
            </div>
        </section>
        
        <!-- Станки -->
        <section class="machines-section">
            <div class="section-header">
                <h2>Станки</h2>
                <span class="badge" id="machinesCount">0/15</span>
            </div>
            <div class="machines-grid" id="machinesGrid">
                <div class="loading">Загрузка...</div>
            </div>
        </section>
    </main>
    
    <script>
        // ========================================
        //  API КЛИЕНТ
        // ========================================
        
        const API_BASE = window.location.origin;
        
        class ApiClient {
            constructor() {
                this.token = localStorage.getItem('token');
                console.log('🔑 ApiClient готов');
            }
        
            setToken(token) {
                this.token = token;
                localStorage.setItem('token', token);
            }
        
            clearToken() {
                this.token = null;
                localStorage.removeItem('token');
            }
        
            async request(endpoint, options = {}) {
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };
                if (this.token) {
                    headers['Authorization'] = `Bearer ${this.token}`;
                }
                const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
                if (response.status === 401) {
                    this.clearToken();
                    window.location.href = '/login.html';
                    throw new Error('Сессия истекла');
                }
                return await response.json();
            }
        
            async login(login, password) {
                const result = await this.request('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ login, password })
                });
                if (result.success && result.token) this.setToken(result.token);
                return result;
            }
        
            async verify() {
                return await this.request('/api/auth/verify', {
                    method: 'POST',
                    body: JSON.stringify({ token: this.token })
                });
            }
        
            async getMachines() { return await this.request('/api/machines'); }
            async getTasks() { return await this.request('/api/tasks'); }
            async getSalary() { return await this.request('/api/salary'); }
            async getStats() { return await this.request('/api/stats'); }
            
            async sendCommand(action, args = []) {
                return await this.request(`/api/command/${action}`, {
                    method: 'POST',
                    body: JSON.stringify({ args })
                });
            }
        }
        
        const api = new ApiClient();
        
        // ========================================
        //  УВЕДОМЛЕНИЯ
        // ========================================
        
        function showToast(message, type = 'info') {
            const old = document.getElementById('toastContainer');
            if (old) old.remove();
            
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container';
            document.body.appendChild(container);
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.remove(); if (!container.children.length) container.remove(); }, 300);
            }, 3000);
        }
        
        // ========================================
        //  ВЫХОД
        // ========================================
        
        async function logout() {
            api.clearToken();
            showToast('👋 Вы вышли', 'info');
            setTimeout(() => window.location.href = '/login.html', 500);
        }
        
        // ========================================
        //  ЗАГРУЗКА ДАННЫХ
        // ========================================
        
        async function loadStats() {
            try {
                const r = await api.getStats();
                if (r.success) {
                    const d = r.data || {};
                    document.getElementById('statToday').textContent = d.totalToday || '--';
                    document.getElementById('statTasks').textContent = d.activeTasks || '--';
                    document.getElementById('statMachines').textContent = 
                        `${d.activeMachines || 0}/${d.totalMachines || 15}`;
                    document.getElementById('statUrgent').textContent = d.urgentTasks || '--';
                }
            } catch (e) { console.error('Stats error:', e); }
        }
        
        async function loadTasks() {
            const el = document.getElementById('tasksList');
            try {
                const r = await api.getTasks();
                if (!r.success) { el.innerHTML = `<div class="error">❌ ${r.error || 'Ошибка'}</div>`; return; }
                
                const tasks = [...(r.data?.inProgress || []), ...(r.data?.pending || [])];
                if (!tasks.length) { el.innerHTML = `<div class="empty">📭 Нет активных заданий</div>`; return; }
                
                el.innerHTML = tasks.map(t => {
                    const p = t.plan > 0 ? Math.round((t.done / t.plan) * 100) : 0;
                    return `
                        <div class="task-item ${t.urgent ? 'urgent' : ''}">
                            <div class="task-info">
                                <div>
                                    <span class="task-id">#${t.id}</span>
                                    <span class="task-model">${t.model || '—'}</span>
                                    ${t.urgent ? '🔥' : ''}
                                </div>
                                <div class="task-meta">${t.color || '—'} · ${t.done || 0}/${t.plan || 0} шт</div>
                            </div>
                            <div class="task-progress">
                                <div class="task-bar"><div class="fill" style="width: ${Math.min(p, 100)}%"></div></div>
                                <span class="task-percent">${p}%</span>
                            </div>
                            <div class="task-actions">
                                <button class="btn btn-success" onclick="completeTask(${t.id})">✅ Завершить</button>
                                <button class="btn btn-secondary" onclick="returnTask(${t.id})">↩️ Вернуть</button>
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('tasksCount').textContent = tasks.length;
            } catch (e) { el.innerHTML = `<div class="error">❌ Ошибка</div>`; }
        }
        
        async function loadMachines() {
            const el = document.getElementById('machinesGrid');
            try {
                const r = await api.getMachines();
                if (!r.success) { el.innerHTML = `<div class="error">❌ ${r.error || 'Ошибка'}</div>`; return; }
                
                const machines = r.data?.machines || [];
                if (!machines.length) { el.innerHTML = `<div class="empty">🖥️ Нет данных</div>`; return; }
                
                el.innerHTML = machines.map(m => {
                    const statusIcon = m.isRunning ? '🟢' : '⚪';
                    const statusText = m.isRunning ? 'Работает' : 'Простаивает';
                    const hours = Math.floor((m.workedMinutes || 0) / 60);
                    const mins = (m.workedMinutes || 0) % 60;
                    const timeStr = m.isRunning ? `⏱️ ${hours > 0 ? hours + 'ч ' + mins + 'м' : mins + 'м'}` : '';
                    
                    return `
                        <div class="machine-card" data-machine="${m.number}">
                            <div class="machine-number">№${m.number}</div>
                            <div class="machine-status">${statusIcon}</div>
                            <div class="machine-status-text">${statusText}</div>
                            ${timeStr ? `<div class="machine-time">${timeStr}</div>` : ''}
                            <div class="machine-helper">👤 ${m.hasHelper ? '✅ Срез.' : '❌ Без срез.'}</div>
                            <div class="machine-actions">
                                ${m.isRunning 
                                    ? `<button class="btn-stop" onclick="stopMachine(${m.number})">⏹ СТОП</button>`
                                    : `<button class="btn-start" onclick="startMachine(${m.number})">▶ СТАРТ</button>`
                                }
                                <button class="btn-helper ${m.hasHelper ? 'active' : ''}" 
                                        onclick="toggleHelper(${m.number})">
                                    👤 ${m.hasHelper ? 'Вкл' : 'Выкл'}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                const active = machines.filter(m => m.isRunning).length;
                document.getElementById('machinesCount').textContent = `${active}/${machines.length}`;
            } catch (e) { el.innerHTML = `<div class="error">❌ Ошибка</div>`; }
        }
        
        // ========================================
        //  ДЕЙСТВИЯ
        // ========================================
        
        async function startMachine(number) {
            try {
                showToast(`🔄 Запуск станка №${number}...`, 'info');
                const r = await api.sendCommand('start', [number]);
                if (r.success) {
                    showToast(`✅ Станок №${number} запущен!`, 'success');
                    await loadMachines();
                    await loadStats();
                } else {
                    showToast(`❌ ${r.error || 'Ошибка запуска'}`, 'error');
                }
            } catch (e) {
                showToast('❌ Ошибка соединения', 'error');
            }
        }
        
        async function stopMachine(number) {
            try {
                showToast(`🔄 Остановка станка №${number}...`, 'info');
                const r = await api.sendCommand('stop', [number]);
                if (r.success) {
                    showToast(`⏹️ Станок №${number} остановлен`, 'info');
                    await loadMachines();
                    await loadStats();
                } else {
                    showToast(`❌ ${r.error || 'Ошибка остановки'}`, 'error');
                }
            } catch (e) {
                showToast('❌ Ошибка соединения', 'error');
            }
        }
        
        async function toggleHelper(number) {
            try {
                const btn = document.querySelector(`.machine-card[data-machine="${number}"] .btn-helper`);
                const isActive = btn?.classList.contains('active');
                const newState = isActive ? 'off' : 'on';
                
                showToast(`🔄 ${isActive ? 'Выключение' : 'Включение'} срезальщицы...`, 'info');
                const r = await api.sendCommand('helper', [number, newState]);
                if (r.success) {
                    showToast(`👤 Срезальщица ${newState === 'on' ? 'включена' : 'выключена'} на станке №${number}`, 'info');
                    await loadMachines();
                } else {
                    showToast(`❌ ${r.error || 'Ошибка'}`, 'error');
                }
            } catch (e) {
                showToast('❌ Ошибка соединения', 'error');
            }
        }
        
        async function completeTask(taskId) {
            try {
                showToast(`🔄 Завершение задания #${taskId}...`, 'info');
                const r = await api.sendCommand('complete', [taskId]);
                if (r.success) {
                    showToast(`✅ Задание #${taskId} завершено!`, 'success');
                    await loadTasks();
                    await loadStats();
                } else {
                    showToast(`❌ ${r.error || 'Ошибка'}`, 'error');
                }
            } catch (e) {
                showToast('❌ Ошибка соединения', 'error');
            }
        }
        
        async function returnTask(taskId) {
            try {
                showToast(`🔄 Возврат задания #${taskId} в очередь...`, 'info');
                const r = await api.sendCommand('return', [taskId]);
                if (r.success) {
                    showToast(`↩️ Задание #${taskId} возвращено в очередь`, 'info');
                    await loadTasks();
                    await loadStats();
                } else {
                    showToast(`❌ ${r.error || 'Ошибка'}`, 'error');
                }
            } catch (e) {
                showToast('❌ Ошибка соединения', 'error');
            }
        }
        
        // ========================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ========================================
        
        async function init() {
            try {
                const r = await api.verify();
                if (!r.success) { window.location.href = '/login.html'; return; }
                
                const userName = r.user?.login || 'Пользователь';
                document.getElementById('userName').textContent = userName;
                
                // Показываем админ-ссылки
                if (r.user?.role === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => {
                        el.style.display = 'block';
                    });
                }
                
                await Promise.all([loadStats(), loadTasks(), loadMachines()]);
                console.log('✅ Дашборд загружен');
            } catch (e) {
                console.error('Ошибка инициализации:', e);
                window.location.href = '/login.html';
            }
        }
        
        // Автообновление каждые 30 секунд
        setInterval(() => {
            if (window.location.pathname === '/dashboard') {
                loadStats();
                loadTasks();
                loadMachines();
            }
        }, 30000);
        
        init();
    </script>
</body>
</html>
