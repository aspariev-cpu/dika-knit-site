<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Knit — Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ======================================== */
        /*  ДАШБОРД — МОБИЛЬНЫЕ СТИЛИ              */
        /* ======================================== */

        .dashboard-container {
            padding: 12px;
            max-width: 100%;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 14px 0;
            border-bottom: 1px solid rgba(201,169,89,0.06);
        }
        .dashboard-header .logo {
            font-size: 20px;
            font-weight: 800;
            color: #c9a959;
        }
        .dashboard-header .logo span {
            color: #fff;
            font-weight: 300;
        }
        .dashboard-header .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8892b0;
            font-size: 13px;
        }
        .dashboard-header .user-info .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #c9a959;
            color: #0a0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }
        .dashboard-header .user-info .logout {
            color: #f87171;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 14px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            border: 1px solid rgba(201,169,89,0.06);
        }
        .stat-card .icon {
            font-size: 18px;
            display: block;
        }
        .stat-card .value {
            font-size: 18px;
            font-weight: 800;
            color: #c9a959;
        }
        .stat-card .label {
            font-size: 9px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stat-card.urgent {
            border-color: rgba(248,113,113,0.3);
            background: rgba(248,113,113,0.05);
        }
        .stat-card.urgent .value {
            color: #f87171;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 14px 0;
        }
        .nav-card {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 12px 6px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(201,169,89,0.06);
            transition: 0.2s;
            display: block;
        }
        .nav-card:active {
            transform: scale(0.95);
        }
        .nav-card .nav-icon {
            font-size: 24px;
            display: block;
        }
        .nav-card .nav-label {
            font-size: 10px;
            color: #8892b0;
            margin-top: 2px;
        }
        .nav-card.admin {
            border-color: rgba(201,169,89,0.2);
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 16px 0 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title .badge {
            font-size: 12px;
            color: #8892b0;
            font-weight: 400;
            background: rgba(255,255,255,0.05);
            padding: 2px 10px;
            border-radius: 12px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 4px;
            border: 1px solid rgba(201,169,89,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .task-item:active {
            transform: scale(0.99);
        }
        .task-item .info {
            flex: 1;
        }
        .task-item .info .id {
            font-weight: 700;
            color: #c9a959;
            font-size: 13px;
        }
        .task-item .info .model {
            font-size: 13px;
            font-weight: 500;
        }
        .task-item .info .meta {
            font-size: 11px;
            color: #8892b0;
        }
        .task-item .progress {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .task-item .progress .bar {
            width: 50px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .task-item .progress .bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #c9a959, #e8c97a);
            border-radius: 2px;
        }
        .task-item .progress .percent {
            font-size: 12px;
            font-weight: 600;
            min-width: 32px;
            text-align: right;
        }
        .task-item.urgent {
            border-color: rgba(248,113,113,0.3);
            background: rgba(248,113,113,0.05);
        }

        .machines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .machine-card {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid rgba(201,169,89,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .machine-card:active {
            transform: scale(0.95);
        }
        .machine-card .number {
            font-size: 11px;
            color: #8892b0;
            font-weight: 600;
        }
        .machine-card .status {
            font-size: 20px;
            display: block;
        }
        .machine-card .time {
            font-size: 9px;
            color: #475569;
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .machines-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">

        <!-- ШАПКА -->
        <div class="dashboard-header">
            <div class="logo">Dika <span>Knit</span></div>
            <div class="user-info">
                <span class="avatar" id="userAvatar">П</span>
                <span id="userName">Пользователь</span>
                <span class="logout" onclick="logout()">🚪</span>
            </div>
        </div>

        <!-- СТАТИСТИКА -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="icon">🧵</span>
                <div class="value" id="statToday">--</div>
                <div class="label">Сегодня</div>
            </div>
            <div class="stat-card">
                <span class="icon">📋</span>
                <div class="value" id="statTasks">--</div>
                <div class="label">В работе</div>
            </div>
            <div class="stat-card">
                <span class="icon">🖥️</span>
                <div class="value" id="statMachines">--</div>
                <div class="label">Станки</div>
            </div>
            <div class="stat-card urgent">
                <span class="icon">🔥</span>
                <div class="value" id="statUrgent">--</div>
                <div class="label">Срочных</div>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <div class="nav-grid">
            <a href="/worker" class="nav-card">
                <span class="nav-icon">🖥️</span>
                <span class="nav-label">Станки</span>
            </a>
            <a href="/worker" class="nav-card">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Задания</span>
            </a>
            <a href="/worker" class="nav-card">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Зарплата</span>
            </a>
            <a href="/admin" class="nav-card admin" id="adminNav">
                <span class="nav-icon">👑</span>
                <span class="nav-label">Админ</span>
            </a>
        </div>

        <!-- ЗАДАНИЯ -->
        <div class="section-title">
            <span>📋 Активные задания</span>
            <span class="badge" id="tasksCount">0</span>
        </div>
        <div id="tasksList">
            <div class="loading">Загрузка...</div>
        </div>

        <!-- СТАНКИ -->
        <div class="section-title">
            <span>🖥️ Станки</span>
            <span class="badge" id="machinesCount">0/15</span>
        </div>
        <div class="machines-grid" id="machinesGrid">
            <div class="loading">Загрузка...</div>
        </div>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
