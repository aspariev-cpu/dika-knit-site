<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Knit — Вязальщик</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="mobile-header">
        <div class="header-content">
            <div class="header-left">
                <a href="/dashboard" class="back-btn">‹</a>
                <span class="logo-text">Вязальщик</span>
            </div>
            <div class="header-right">
                <span class="user-name" id="userName">Загрузка...</span>
            </div>
        </div>
    </header>
    
    <main class="mobile-main">
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="machines">Станки</button>
            <button class="tab-btn" data-tab="tasks">Задания</button>
            <button class="tab-btn" data-tab="salary">Зарплата</button>
        </div>
        
        <!-- Станки -->
        <div class="tab-content active" id="tab-machines">
            <div class="machines-grid" id="machinesGrid">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <!-- Задания -->
        <div class="tab-content" id="tab-tasks">
            <div class="tasks-list" id="tasksList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <!-- Зарплата -->
        <div class="tab-content" id="tab-salary">
            <div class="salary-widget" id="salaryWidget">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </main>
    
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
